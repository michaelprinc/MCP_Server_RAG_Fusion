version: "3.9"

# Shared volumes for data persistence
volumes:
  rag_data:
    driver: local
  rag_indexes:
    driver: local
  rag_artifacts:
    driver: local
  rag_pdf:
    driver: local

# Dedicated network for service communication
networks:
  rag_network:
    driver: bridge

services:
  # ========================================
  # Indexer Service
  # Responsible for PDF processing and index building
  # ========================================
  indexer-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.indexer-service
    container_name: rag_indexer
    environment:
      PORT: "8082"
      PDF_DIR: /data/pdf
      ARTIFACTS_DIR: /data/artifacts
      INDEX_OUTPUT_DIR: /data/indexes
      LOG_LEVEL: INFO
      # PDF processing configuration
      OCR_LANGUAGES: eng
      CHUNK_SIZE: "512"
      CHUNK_OVERLAP: "50"
      EMBEDDING_MODEL: BAAI/bge-m3
    volumes:
      # Shared volumes with other services
      - rag_pdf:/data/pdf
      - rag_artifacts:/data/artifacts
      - rag_indexes:/data/indexes:rw  # Read-write for building indexes
      # Configuration files (read-only)
      - ./configs:/app/configs:ro
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s  # Allow time for model downloads
    restart: unless-stopped
    networks:
      - rag_network
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G

  # ========================================
  # Retrieval Service
  # Core RAG-Fusion engine for retrieval and reranking
  # ========================================
  retrieval-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.retrieval-service
    container_name: rag_retrieval
    environment:
      PORT: "8081"
      INDEX_DIR: /data/indexes
      MODEL_CONFIG: /app/configs/model-config.yml
      ROUTER_MODE: classifier
      LOG_LEVEL: INFO
      CACHE_SIZE: "1000"
      # Retrieval parameters
      TOP_K_INITIAL: "50"
      RERANK_TOP_K: "10"
    volumes:
      # Read-only access to indexes
      - rag_indexes:/data/indexes:ro
      - rag_artifacts:/data/artifacts:ro
      # Configuration files (read-only)
      - ./configs:/app/configs:ro
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 45s  # Allow time for index loading
    restart: unless-stopped
    networks:
      - rag_network
    depends_on:
      indexer-service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 3G

  # ========================================
  # MCP Gateway Service
  # Model Context Protocol interface layer
  # ========================================
  mcp-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.mcp-gateway
    container_name: rag_mcp_gateway
    environment:
      PORT: "8080"
      RETRIEVAL_SERVICE_URL: http://retrieval-service:8081
      REQUEST_TIMEOUT: "30"
      MAX_RETRIES: "3"
      LOG_LEVEL: INFO
      # MCP configuration
      MCP_TOOLS: /app/configs/mcp-tools.json
    volumes:
      # Configuration files (read-only)
      - ./configs:/app/configs:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 2s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - rag_network
    depends_on:
      retrieval-service:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ========================================
  # Optional: Monitoring Stack (Prometheus + Grafana)
  # Uncomment to enable monitoring
  # ========================================
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: rag_prometheus
  #   volumes:
  #     - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #   ports:
  #     - "9090:9090"
  #   networks:
  #     - rag_network
  #   restart: unless-stopped

  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: rag_grafana
  #   environment:
  #     GF_SECURITY_ADMIN_PASSWORD: admin
  #   ports:
  #     - "3000:3000"
  #   networks:
  #     - rag_network
  #   depends_on:
  #     - prometheus
  #   restart: unless-stopped

# ========================================
# Service Communication Flow:
# ========================================
# User/Client → MCP Gateway (8080)
#                   ↓
#            Retrieval Service (8081)
#                   ↓
#            Indexes (shared volume)
#                   ↑
#            Indexer Service (8082)
#
# Each service is independently scalable and monitorable
